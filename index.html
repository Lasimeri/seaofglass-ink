<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sea of glass - ink</title>
  <meta property="og:title" content="sea of glass - ink">
  <meta property="og:description" content="encrypted pastebin - serverless, zero trust">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="header-row">
      <div>
        <h1><span>sea of glass</span> / ink</h1>
        <p class="subtitle">encrypted pastebin - serverless, zero trust</p>
      </div>
      <button id="dir-toggle" class="dir-toggle-btn" title="Browse pastes">pastes</button>
    </div>

    <div id="status"></div>

    <div id="create-section">
      <div class="editor-frame">
        <textarea id="paste-input" placeholder="enter text to encrypt..." spellcheck="false"></textarea>
        <div class="editor-footer">
          <span id="char-count">0 chars</span>
          <span id="line-count">1 line</span>
        </div>
      </div>

      <div class="options-row">
        <select id="mode-select">
          <option value="shareable">shareable</option>
          <option value="public">public</option>
          <option value="device">device-bound</option>
        </select>
        <input type="password" id="password-input" placeholder="password (optional)">
        <button id="create-paste">encrypt & save</button>
      </div>
    </div>

    <div id="share-section" class="hidden">
      <p class="hint">share this link - the encryption key is in the fragment</p>
      <div class="share-row">
        <input type="text" id="share-link" readonly>
        <button id="copy-link">Copy</button>
      </div>
    </div>

    <div id="password-section" class="hidden">
      <p class="hint">this paste requires a password</p>
      <div class="share-row">
        <input type="password" id="read-password" placeholder="enter password">
        <button id="read-password-btn">Decrypt</button>
      </div>
    </div>

    <div id="read-section" class="hidden">
      <pre id="decrypted-text"></pre>
      <button id="copy-text">Copy</button>
    </div>

    <div id="log" class="log-panel"></div>
  </div>

  <!-- Directory overlay panel -->
  <div id="dir-panel" class="dir-overlay hidden">
    <div class="dir-header">
      <span>pastes</span>
      <button id="dir-close">&times;</button>
    </div>
    <div id="dir-log" class="dir-log"></div>
    <div id="directory-list" class="dir-list"></div>
  </div>

  <script type="module" src="js/main.js?v=8"></script>
</body>
</html>
