<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sea of glass - ink</title>
  <meta property="og:title" content="sea of glass - ink">
  <meta property="og:description" content="encrypted pastebin - dns-backed, zero trust">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1><span>sea of glass</span> / ink</h1>
    <p class="subtitle">encrypted pastebin &mdash; dns-backed, zero trust</p>

    <div id="status" class="status"></div>

    <div id="create-section">
      <div class="editor-frame">
        <textarea id="paste-input" placeholder="enter text to encrypt..." spellcheck="false"></textarea>
        <div class="editor-footer">
          <span id="char-count">0 chars</span>
          <span id="line-count">1 line</span>
        </div>
      </div>

      <div class="action-row">
        <button id="create-btn">encrypt &amp; save</button>
      </div>

      <div id="share-section" class="hidden">
        <p class="hint">share this link &mdash; the key is in the fragment (never sent to a server)</p>
        <div class="share-row">
          <input type="text" id="share-link" readonly>
          <button id="copy-link">copy</button>
        </div>
      </div>
    </div>

    <div id="read-section" class="hidden">
      <div class="read-frame">
        <pre id="decrypted-text"></pre>
      </div>
      <div class="action-row">
        <button id="copy-text">copy</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
